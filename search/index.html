<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vyhledávání — Larpová databáze</title>
  <base href="/larpova-databaze/">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700&subset=latin,latin-ext">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="archive-banner">Toto je archiv webu larpovadatabaze.cz. Data jsou pouze ke čtení.</div>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="./">
        <img src="images/logo.png" alt="Larpová databáze" height="30">
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item"><a class="nav-link" href="games/recentAndMostPlayed/">Hry</a></li>
          <li class="nav-item"><a class="nav-link" href="kalendar/">Kalendář akcí</a></li>
        </ul>
        <form class="form-inline" action="search/" method="get">
          <input class="form-control form-control-sm mr-2" type="text" id="searchInput" placeholder="Hledaný výraz" name="q">
          <button class="btn btn-outline-light btn-sm" type="submit">Hledat</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-4">
    <h1>Vyhledávání</h1>

<div class="mb-4">
  <input type="text" id="searchBox" class="form-control form-control-lg" placeholder="Hledejte hru podle názvu..." autofocus>
</div>

<div id="searchResults">
  <p class="text-muted" id="searchHint">Začněte psát pro vyhledání her...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
let fuse = null;
let searchData = null;

fetch('search-index.json')
  .then(r => r.json())
  .then(data => {
    searchData = data;
    fuse = new Fuse(data, {
      keys: ['name', 'authors', 'labels'],
      threshold: 0.3,
      includeScore: true,
    });
    // Check URL query param
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      document.getElementById('searchBox').value = q;
      doSearch(q);
    }
  });

function doSearch(query) {
  const container = document.getElementById('searchResults');
  if (!fuse || !query.trim()) {
    container.innerHTML = '<p class="text-muted" id="searchHint">Začněte psát pro vyhledání her...</p>';
    return;
  }

  const results = fuse.search(query, { limit: 50 });
  if (results.length === 0) {
    container.innerHTML = '<p class="text-muted">Žádné výsledky.</p>';
    return;
  }

  let html = '<div class="list-group">';
  for (const r of results) {
    const g = r.item;
    html += `<a href="larp/${g.slug}/cs/${g.id}/" class="list-group-item list-group-item-action">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <strong>${escapeHtml(g.name)}</strong> (${g.year || '?'})
          <br><small class="text-muted">${escapeHtml(g.labels || '')}</small>
        </div>
        ${g.rating > 0 ? `<span class="badge badge-primary badge-pill">${g.rating.toFixed(1)}</span>` : ''}
      </div>
    </a>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.getElementById('searchBox').addEventListener('input', (e) => {
  doSearch(e.target.value);
});
</script>

  </div>

  <footer class="footer bg-light py-3 mt-4">
    <div class="container text-center text-muted">
      <p>&copy; 2013&ndash;2026 Larpová databáze (archiv)</p>
      <p>Tým LD: Jakub Balhar &bull; Michal Havelka &bull; Petr Kuběnský &bull; Filip Appl &bull; Tomáš Felcman &bull; Michal Kára</p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
